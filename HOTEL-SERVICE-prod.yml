    open-in-view: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

resilience4j:
  retry:
    retryAspectOrder: 2
    instances:
      userServiceRetry:
        maxAttempts: 3
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2 

  circuitbreaker:
    instances:
      circuitBreakerAspectOrder: 1
      userServiceCB:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 1m
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,retry,retryevents

  endpoint:
    health:
      show-details: always

  health:
    circuitbreakers:
      enabled: true

  info:
    env:
      enabled: true

info:
  app:
    name: HOTEL-SERVICE
    description: Hotel Service API
    version: 1.0
