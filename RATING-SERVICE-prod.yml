server:
  servlet:
    context-path: "/api/v1"
  port: 8083

spring:
  application:
    name: RATING-SERVICE-PROD

  datasource:
    url: jdbc:mysql://localhost:3306/ratingservice?useSSL=false&serverTimezone=UTC
    username: root
    password: Pass@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

  info:
    env:
      enabled: true

info:
  app:
    name: RATING-SERVICE
    description: Rating Service API
    version: 1.0
