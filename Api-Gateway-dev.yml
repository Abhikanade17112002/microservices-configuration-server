server:
  port: 8080

spring:
  application:
    name: API-GATEWAY-DEV

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"    
                

          routes:
            - id: user-service-route
              uri: lb://USER-SERVICE-DEV
              predicates:
                - Path=/api/v1/customers/**,/api/v1/auth/**,/api/v1/owners/**,/api/v1/internal/**,/api/v1/users/**
              filters:
                - AddRequestHeader=X-SOURCE,GATEWAY
                - AddResponseHeader=X-API-VERSION,V1
                - RemoveRequestHeader=Cookie
                - RemoveResponseHeader=Server

            - id: hotel-service-route
              uri: lb://HOTEL-SERVICE-DEV
              predicates:
                - Path=/api/v1/hotels/**

            - id: rating-service-route
              uri: lb://RATING-SERVICE-DEV
              predicates:
                - Path=/api/v1/ratings/**
            
            - id: booking-service-route
              uri: lb://BOOKING-SERVICE-DEV
              predicates:
                - Path=/api/v1/bookings/**    

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

info:
  app:
    name: API-GATEWAY
    description: Api Gateway
    version: 1.0
